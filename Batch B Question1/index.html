<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Form</title>

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h2>Bongo Class Registration Form</h2>

    <form id="registrationForm">

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name">

        <small class="error" id="nameError"></small>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="text" id="email">

        <small class="error" id="emailError"></small>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password">

        <small class="error" id="passwordError"></small>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword">

        <small class="error" id="confirmPasswordError"></small>
      </div>

      <button type="submit">Register</button>

      <p class="success" id="successMessage"></p>

      <img
        id="successGif"
        src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fotkritkis.com%2Fwp-content%2Fuploads%2F2022%2F06%2Fm7wxc.gif&f=1&nofb=1&ipt=dcd164c908f26317f284474fc772f239dcde0e80ab371eaa54c039cb102c5bc6"
        alt="Success GIF"
        class="gif"
      />

    </form>

  </div>
  
  <!-- Confetti Library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <!-- External JS -->
  <script src="script.js"></script>

</body>
</html>
